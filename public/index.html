<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>전자 서명 - 서명하기</title>
  <meta name="description" content="이름을 입력하고 직접 서명을 그려 제출하는 전자 서명 페이지입니다." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page-wrapper">
    <!-- ── 헤더 ── -->
    <header>
      <a href="index.html" class="logo">
        <span class="logo-icon">✍️</span>
        <span>전자 서명</span>
      </a>
      <p>안전하고 간편한 디지털 서명 서비스</p>
    </header>

    <!-- ── 탭 내비게이션 ── -->
    <nav class="nav-tabs" style="max-width:680px; width:100%; margin-bottom:20px;">
      <a href="index.html" class="nav-tab active">✏️ 서명하기</a>
      <a href="list.html" class="nav-tab">📋 서명 목록</a>
    </nav>

    <!-- ── 서명 입력 카드 ── -->
    <main class="card" id="main-card">
      <p class="section-title">서명 정보 입력</p>

      <!-- 이름 입력 -->
      <div class="form-group">
        <label for="signer-name">이름 <span class="required-star">*</span></label>
        <input
          type="text"
          id="signer-name"
          placeholder="홍길동"
          maxlength="50"
          autocomplete="name"
        />
      </div>

      <!-- 서명 캔버스 -->
      <div class="form-group">
        <label>서명 <span class="required-star">*</span></label>
        <div class="canvas-wrapper" id="canvas-wrapper">
          <!-- 안내 문구: 서명을 그리기 시작하면 사라집니다 -->
          <div class="canvas-hint" id="canvas-hint">
            🖊️ 여기에 마우스 또는 손가락으로 서명하세요
          </div>
          <!-- 실제 서명을 그리는 캔버스 -->
          <canvas id="signature-canvas"></canvas>
        </div>
      </div>

      <!-- 버튼 영역 -->
      <div class="btn-group">
        <!-- 캔버스 초기화 -->
        <button type="button" class="btn btn-secondary" id="btn-clear">
          🗑️ 지우기
        </button>
        <!-- 서명 제출 -->
        <button type="button" class="btn btn-primary" id="btn-submit">
          ✅ 서명 제출
        </button>
      </div>
    </main>
  </div>

  <!-- 토스트 알림 (JS에서 제어) -->
  <div class="toast" id="toast"></div>

  <!-- 서명 로직 -->
  <script src="js/signature.js"></script>
</body>
</html>
